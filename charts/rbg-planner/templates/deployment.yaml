apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rbg-planner.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rbg-planner.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "rbg-planner.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rbg-planner.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "rbg-planner.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: operator
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        args:
        - --metrics-bind-address=:{{ .Values.metrics.port }}
        - --health-probe-bind-address=:{{ .Values.healthProbe.port }}
        {{- if .Values.leaderElection.enabled }}
        - --leader-elect
        {{- end }}
        {{- if .Values.planner.image }}
        - --planner-image={{ .Values.planner.image }}
        {{- end }}
        {{- if .Values.profiler.image }}
        - --profiler-image={{ .Values.profiler.image }}
        {{- end }}
        {{- if .Values.prometheus.endpoint }}
        - --prometheus-endpoint={{ .Values.prometheus.endpoint }}
        {{- end }}
        ports:
        - name: metrics
          containerPort: {{ .Values.metrics.port }}
          protocol: TCP
        - name: health
          containerPort: {{ .Values.healthProbe.port }}
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
