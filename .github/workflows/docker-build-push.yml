name: Docker Image Build and Push

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'

env:
  MULTIARCH_PLATFORMS: linux/amd64,linux/arm64

permissions:
  contents: read

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: operator
            context: .
            dockerfile: Dockerfile
            image_suffix: rbg-planner-operator
          - name: planner
            context: python/planner
            dockerfile: python/planner/Dockerfile
            image_suffix: rbg-planner
          - name: profiler
            context: python/profiler
            dockerfile: python/profiler/Dockerfile
            image_suffix: rbg-profiler
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_SECRET }}

      - name: Determine image tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ github.event.inputs.tag || 'latest' }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.MULTIARCH_PLATFORMS }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_suffix }}:${{ steps.meta.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_suffix }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Summary
        run: |
          echo "## ${{ matrix.name }} Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${{ steps.meta.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_suffix }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms:** ${{ env.MULTIARCH_PLATFORMS }}" >> $GITHUB_STEP_SUMMARY
