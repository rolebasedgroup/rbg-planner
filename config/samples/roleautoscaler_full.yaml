apiVersion: inference-extension.rolebasedgroup.io/v1alpha1
kind: AutoScaler
metadata:
  name: sglang-pd-inference    # must match the RBG name
  namespace: inference
spec:
  scalingInterval: 180    # seconds between scaling decisions

  # Scaling pattern
  pattern:
    # PDDisaggregated: Prefill/Decode disaggregated scaling (supported)
    # Unified: Unified scaling (reserved, not yet implemented)
    PDDisaggregated:
      prefill:
        roleName: prefill
        maxReplicas: 10
        minReplicas: 1
      decode:
        roleName: decode
        maxReplicas: 10
        minReplicas: 1

  # Scaling engine type
  implementation:
    # DynamoPlanner: SLA-based planner derived from NVIDIA Dynamo
    DynamoPlanner:
      modelName: "Qwen/Qwen3-0.6B"

      # SLA targets
      ttft: 200.0             # target TTFT in milliseconds
      itl: 20.0               # target ITL in milliseconds

      # Load prediction
      loadPredictor: arima       # arima | constant | prophet
      predictionWindow: 50       # data points in predictor window

      # Correction factors
      noCorrection: false        # disable SLA correction factors

      # Dry-run mode
      dryRun: false              # observe only, no actual scaling

      profiling:
        image: "ghcr.io/rolebasedgroup/rbg-profiler:latest"

      # Metrics configuration
      metricsEndpoint:
        metricSource: sglang
        port: 9091
