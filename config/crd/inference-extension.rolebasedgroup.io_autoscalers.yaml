---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: autoscalers.inference-extension.rolebasedgroup.io
spec:
  group: inference-extension.rolebasedgroup.io
  names:
    kind: AutoScaler
    listKind: AutoScalerList
    plural: autoscalers
    shortNames:
    - as
    singular: autoscaler
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Current phase
      jsonPath: .status.phase
      name: PHASE
      type: string
    - description: Prefill replicas
      jsonPath: .status.prefillReplicas
      name: PREFILL
      type: integer
    - description: Decode replicas
      jsonPath: .status.decodeReplicas
      name: DECODE
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AutoScaler is the Schema for the autoscalers API.
          An AutoScaler automatically scales roles within a RoleBasedGroup
          to meet SLA targets. The AutoScaler name must match the target
          RoleBasedGroup name in the same namespace.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AutoScalerSpec defines the desired state of AutoScaler.
            properties:
              implementation:
                description: Implementation defines the scaling engine and its configuration.
                properties:
                  DynamoPlanner:
                    description: DynamoPlanner configures the Dynamo-derived SLA-based
                      planner.
                    properties:
                      dryRun:
                        description: DryRun enables observe-only mode without actual
                          scaling.
                        type: boolean
                      itl:
                        default: 50
                        description: ITL is the target Inter-Token Latency SLA in
                          milliseconds.
                        type: number
                      loadPredictor:
                        default: arima
                        description: LoadPredictor selects the load prediction algorithm.
                        enum:
                        - arima
                        - constant
                        - prophet
                        type: string
                      metricsEndpoint:
                        description: MetricsEndpoint configures the metrics collection
                          endpoint.
                        properties:
                          metricSource:
                            default: sglang
                            description: MetricSource selects the metric source type.
                            enum:
                            - sglang
                            - vllm
                            - patio
                            type: string
                          port:
                            default: 9091
                            description: Port is the port for planner's own Prometheus
                              metrics exposition.
                            type: integer
                        type: object
                      modelName:
                        description: ModelName is the model name used for Prometheus
                          label filtering.
                        type: string
                      noCorrection:
                        description: NoCorrection disables SLA correction factors.
                        type: boolean
                      predictionWindow:
                        default: 50
                        description: PredictionWindow is the number of data points
                          in the predictor window.
                        type: integer
                      profiling:
                        description: Profiling configures automatic SLA profiling.
                        properties:
                          image:
                            description: |-
                              Image is the container image for the profiling tool.
                              If empty, a default image is used.
                            type: string
                        type: object
                      ttft:
                        default: 500
                        description: TTFT is the target Time to First Token SLA in
                          milliseconds.
                        type: number
                    type: object
                type: object
              pattern:
                description: Pattern defines the scaling pattern and per-role configuration.
                properties:
                  PDDisaggregated:
                    description: PDDisaggregated configures Prefill/Decode disaggregated
                      scaling.
                    properties:
                      decode:
                        description: Decode defines the decode role scaling configuration.
                        properties:
                          maxReplicas:
                            description: MaxReplicas is the maximum number of replicas
                              for this role.
                            format: int32
                            minimum: 1
                            type: integer
                          minReplicas:
                            default: 1
                            description: MinReplicas is the minimum number of replicas
                              for this role.
                            format: int32
                            minimum: 1
                            type: integer
                          roleName:
                            default: prefill
                            description: RoleName is the name of the role in the RoleBasedGroup.
                            type: string
                        required:
                        - maxReplicas
                        - minReplicas
                        - roleName
                        type: object
                      prefill:
                        description: Prefill defines the prefill role scaling configuration.
                        properties:
                          maxReplicas:
                            description: MaxReplicas is the maximum number of replicas
                              for this role.
                            format: int32
                            minimum: 1
                            type: integer
                          minReplicas:
                            default: 1
                            description: MinReplicas is the minimum number of replicas
                              for this role.
                            format: int32
                            minimum: 1
                            type: integer
                          roleName:
                            default: prefill
                            description: RoleName is the name of the role in the RoleBasedGroup.
                            type: string
                        required:
                        - maxReplicas
                        - minReplicas
                        - roleName
                        type: object
                    required:
                    - decode
                    - prefill
                    type: object
                  Unified:
                    description: |-
                      Unified configures unified (non-disaggregated) scaling.
                      Reserved for future use.
                    properties:
                      maxReplicas:
                        description: MaxReplicas is the maximum number of replicas.
                        format: int32
                        minimum: 1
                        type: integer
                      minReplicas:
                        default: 1
                        description: MinReplicas is the minimum number of replicas.
                        format: int32
                        minimum: 1
                        type: integer
                      roleName:
                        description: RoleName is the name of the role in the RoleBasedGroup.
                        type: string
                    required:
                    - maxReplicas
                    - minReplicas
                    - roleName
                    type: object
                type: object
              scalingInterval:
                default: 180
                description: ScalingInterval is the number of seconds between scaling
                  decisions.
                type: integer
            required:
            - implementation
            - pattern
            type: object
          status:
            description: AutoScalerStatus defines the observed state of AutoScaler.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the AutoScaler's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              decodeReplicas:
                description: DecodeReplicas is the current decode replica count.
                format: int32
                type: integer
              lastTransitionTime:
                description: LastTransitionTime is the last time the phase transitioned.
                format: date-time
                type: string
              phase:
                description: Phase indicates the current phase of the AutoScaler.
                enum:
                - Pending
                - Initializing
                - Ready
                - Failed
                type: string
              plannerDeployment:
                description: PlannerDeployment is the name of the planner Deployment.
                type: string
              prefillReplicas:
                description: PrefillReplicas is the current prefill replica count.
                format: int32
                type: integer
              profilingConfigMap:
                description: ProfilingConfigMap is the name of the ConfigMap containing
                  profiling data.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
