apiVersion: workloads.x-k8s.io/v1alpha2
kind: RoleBasedGroup
metadata:
  name: sglang-pd-inference
  namespace: demo
  labels:
    app: sglang-inference
    deployment-type: pd-disaggregated
    model: qwen3-6-35b-a3b
    runtime: dynamo-sglang
  annotations:
    rbg.workloads.x-k8s.io/discovery-config-mode: refine
spec:
  roles:
  # Processor: Dynamo frontend for request routing and HTTP API (exposes metrics)
  - name: processor
    replicas: 1
    minReadySeconds: 0
    podManagementPolicy: Parallel
    standalonePattern:
      template:
        metadata:
          labels:
            app: sglang-inference
            role: processor
        spec:
          nodeName: e01-cn-ow74ku7yn01
          tolerations:
          - key: "node-role.alibabacloud.com/lingjun"
            operator: "Exists"
            effect: "NoSchedule"
          containers:
          - name: sglang
            image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.1.1
            imagePullPolicy: IfNotPresent
            command:
            - python3
            - -m
            - dynamo.frontend
            args:
            - --http-port
            - "8000"
            env:
            - name: DYN_NAMESPACE
              value: default
            - name: DYNAMO_NAMESPACE
              value: default
            - name: ETCD_ENDPOINTS
              value: http://etcd.default.svc.cluster.local:2379
            - name: NATS_SERVER
              value: nats://nats.default.svc.cluster.local:4222
            ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            readinessProbe:
              httpGet:
                path: /health
                port: 8000
              initialDelaySeconds: 30
              periodSeconds: 10
            livenessProbe:
              httpGet:
                path: /health
                port: 8000
              initialDelaySeconds: 60
              periodSeconds: 30
            resources:
              requests:
                cpu: "2"
                memory: 8Gi
              limits:
                cpu: "4"
                memory: 16Gi
            volumeMounts:
            - name: model-storage
              mountPath: /models
              readOnly: true
          volumes:
          - name: model-storage
            hostPath:
              path: /mnt/models
              type: Directory

  # Prefill: Dynamo SGLang prefill engine
  - name: prefill
    replicas: 1
    minReadySeconds: 0
    podManagementPolicy: Parallel
    restartPolicy: None
    standalonePattern:
      template:
        metadata:
          labels:
            app: sglang-inference
            role: prefill
            alibabacloud.com/inference-workload: sglang-pd-inference
            alibabacloud.com/inference-backend: sglang-pd
        spec:
          nodeName: e01-cn-ow74ku7yn01
          tolerations:
          - key: "node-role.alibabacloud.com/lingjun"
            operator: "Exists"
            effect: "NoSchedule"
          containers:
          - name: sglang
            image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.1.1
            imagePullPolicy: IfNotPresent
            command:
            - python3
            - -m
            - dynamo.sglang
            args:
            - --model-path
            - /models/qwen-qwen3.6-35b-a3b/main
            - --served-model-name
            - qwen3-6
            - --host
            - 0.0.0.0
            - --tp-size
            - "1"
            - --context-length
            - "262144"
            - --mem-fraction-static
            - "0.9"
            - --max-running-requests
            - "2048"
            - --chunked-prefill-size
            - "8192"
            - --disaggregation-mode
            - prefill
            - --disaggregation-transfer-backend
            - nixl
            - --disaggregation-bootstrap-port
            - "30001"
            - --enable-metrics
            - --weight-loader-disable-mmap
            env:
            - name: DYN_NAMESPACE
              value: default
            - name: DYNAMO_NAMESPACE
              value: default
            - name: ETCD_ENDPOINTS
              value: http://etcd.default.svc.cluster.local:2379
            - name: NATS_SERVER
              value: nats://nats.default.svc.cluster.local:4222
            ports:
            - name: http
              containerPort: 30000
              protocol: TCP
            resources:
              limits:
                cpu: "2"
                memory: 64Gi
                nvidia.com/gpu: "1"
              requests:
                cpu: "2"
                memory: 64Gi
                nvidia.com/gpu: "1"
            volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: model-storage
              mountPath: /models
          volumes:
          - name: shm
            emptyDir:
              medium: Memory
              sizeLimit: 16Gi
          - name: model-storage
            hostPath:
              path: /mnt/models
              type: Directory

  # Decode: Dynamo SGLang decode engine
  - name: decode
    replicas: 1
    minReadySeconds: 0
    podManagementPolicy: Parallel
    restartPolicy: None
    standalonePattern:
      template:
        metadata:
          labels:
            app: sglang-inference
            role: decode
            alibabacloud.com/inference-workload: sglang-pd-inference
            alibabacloud.com/inference-backend: sglang-pd
        spec:
          nodeName: e01-cn-ow74ku7yn01
          tolerations:
          - key: "node-role.alibabacloud.com/lingjun"
            operator: "Exists"
            effect: "NoSchedule"
          containers:
          - name: sglang
            image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.1.1
            imagePullPolicy: IfNotPresent
            command:
            - python3
            - -m
            - dynamo.sglang
            args:
            - --model-path
            - /models/qwen-qwen3.6-35b-a3b/main
            - --served-model-name
            - qwen3-6
            - --host
            - 0.0.0.0
            - --tp-size
            - "1"
            - --context-length
            - "262144"
            - --mem-fraction-static
            - "0.9"
            - --max-running-requests
            - "512"
            - --chunked-prefill-size
            - "8192"
            - --disaggregation-mode
            - decode
            - --disaggregation-transfer-backend
            - nixl
            - --disaggregation-bootstrap-port
            - "30001"
            - --enable-metrics
            - --weight-loader-disable-mmap
            env:
            - name: DYN_NAMESPACE
              value: default
            - name: DYNAMO_NAMESPACE
              value: default
            - name: ETCD_ENDPOINTS
              value: http://etcd.default.svc.cluster.local:2379
            - name: NATS_SERVER
              value: nats://nats.default.svc.cluster.local:4222
            ports:
            - name: http
              containerPort: 30000
              protocol: TCP
            resources:
              limits:
                cpu: "2"
                memory: 64Gi
                nvidia.com/gpu: "1"
              requests:
                cpu: "2"
                memory: 64Gi
                nvidia.com/gpu: "1"
            volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: model-storage
              mountPath: /models
          volumes:
          - name: shm
            emptyDir:
              medium: Memory
              sizeLimit: 16Gi
          - name: model-storage
            hostPath:
              path: /mnt/models
              type: Directory
