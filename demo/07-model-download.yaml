## Copy model from OSS PVC to hostPath on e01 GPU nodes
---
apiVersion: batch/v1
kind: Job
metadata:
  name: model-copy-e01-node1
  namespace: demo
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      nodeName: e01-cn-ow74ku7yn01
      tolerations:
      - key: "node-role.alibabacloud.com/lingjun"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: copy
        image: lmsysorg/sglang:v0.5.12.post1
        imagePullPolicy: IfNotPresent
        command:
        - bash
        - -c
        - |
          set -e
          SRC="/oss-models/qwen-qwen3.6-35b-a3b/main"
          DST="/models/qwen-qwen3.6-35b-a3b/main"
          if [ -f "$DST/config.json" ]; then
            echo "Model already exists at $DST, skipping copy"
          else
            echo "Copying model from OSS PVC to hostPath..."
            mkdir -p "$DST"
            cp -rv "$SRC/"* "$DST/"
            echo "Copy complete!"
          fi
          echo "Verifying..."
          ls -lh "$DST/" | head -20
        volumeMounts:
        - name: oss
          mountPath: /oss-models
          readOnly: true
        - name: hostpath-models
          mountPath: /models
      volumes:
      - name: oss
        persistentVolumeClaim:
          claimName: oss-storage
      - name: hostpath-models
        hostPath:
          path: /mnt/models
          type: DirectoryOrCreate
